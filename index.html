<script type="module">
    // 1. IMPORT your data from the other file
    import { allQuestions, practices } from './data.js';

    // 2. STATE
    let activeQuestions = [];
    let step = 0;
    let session = { preMood: 5, postMood: 5, answers: {}, skippedQuestions: [], skippedActivity: false };

    // 3. NAVIGATION (Expose functions to HTML)
    // Because this is a "module", we must attach functions to 'window'
    // so the buttons in your HTML can still find them.
    window.startFlow = startFlow;
    window.showHistory = showHistory;
    window.showHome = showHome;
    window.saveMood = saveMood;
    window.recordAnswer = recordAnswer;
    window.skipQ = skipQ;
    window.skipActivity = skipActivity;
    window.startSurvey = startSurvey;

    function showHome() {
        const ui = document.getElementById('mainUI');
        ui.innerHTML = `
            <div class="card">
                <h1>Vibe Tracker</h1>
                <p>Ready for a check-in?</p>
                <button class="btn" onclick="startFlow()">Start Check-in</button>
                <button class="btn btn-outline" onclick="showHistory()">Passed Reports</button>
            </div>
        `;
    }

    function startFlow() {
        session = { preMood: 5, postMood: 5, answers: {}, skippedQuestions: [], skippedActivity: false };
        renderMood('pre');
    }

    function renderMood(timing) {
        const ui = document.getElementById('mainUI');
        const title = timing === 'pre' ? "How's your mood right now?" : "How's your mood after the practice?";
        ui.innerHTML = `
            <div class="card">
                <h2>${title}</h2>
                <input type="range" id="moodS" min="1" max="10" value="5" oninput="mVal.innerText=this.value">
                <p style="font-size: 3rem; font-weight: bold; margin:0;" id="mVal">5</p>
                <button class="btn" onclick="saveMood('${timing}')">Confirm</button>
            </div>
        `;
    }

    function saveMood(timing) {
        const val = parseInt(document.getElementById('moodS').value);
        if (timing === 'pre') {
            session.preMood = val;
            startSurvey();
        } else {
            session.postMood = val;
            saveAndFinish();
        }
    }

    function startSurvey() {
        const shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        activeQuestions = shuffled.slice(0, 5);
        step = 0;
        renderQuestion();
    }

    function renderQuestion() {
        const ui = document.getElementById('mainUI');
        if (step >= activeQuestions.length) {
            renderPracticeSuggestion();
            return;
        }
        const q = activeQuestions[step];
        let inputs = '';
        if (q.type === 'toggle' || q.type === 'choice') {
            inputs = q.options.map(opt => `<button class="btn" onclick="recordAnswer('${opt}')">${opt}</button>`).join('');
        } else {
            inputs = `
                <input type="range" id="qS" min="${q.min}" max="${q.max}" value="${Math.floor(q.max/2)}" oninput="qV.innerText=this.value">
                <p><span id="qV">${Math.floor(q.max/2)}</span> ${q.unit || ''}</p>
                <button class="btn" style="background:var(--green)" onclick="recordAnswer(document.getElementById('qS').value)">Confirm</button>
            `;
        }
        ui.innerHTML = `
            <div class="card">
                <p style="color:var(--blue); font-weight:bold;">Question ${step+1}/5</p>
                <h2>${q.text}</h2>
                ${inputs}
                <button class="btn-skip" onclick="skipQ()">Skip Question</button>
            </div>
        `;
        const s = document.getElementById('qS');
        if (s) s.oninput = function() { document.getElementById('qV').innerText = this.value; };
    }

    function recordAnswer(val) {
        session.answers[activeQuestions[step].id] = val;
        step++;
        renderQuestion();
    }

    function skipQ() {
        session.skippedQuestions.push(activeQuestions[step].id);
        step++;
        renderQuestion();
    }

    function renderPracticeSuggestion() {
        const ui = document.getElementById('mainUI');
        const negatives = ['Yes', 'Tense', 'Chest', 'Fast', 'Strained', 'Raised', 'Furrowed', 'Slouched', 'Cold', 'Damp', 'Pressure', 'Cluttered', 'Stuck', 'Hopping'];
        const triggeredIds = Object.keys(session.answers).filter(id => negatives.includes(session.answers[id]) || parseInt(session.answers[id]) > 5);

        const suggested = practices.find(p => p.trigger_ids.some(tid => triggeredIds.includes(tid))) || practices[Math.floor(Math.random() * practices.length)];

        ui.innerHTML = `
            <div class="card" style="border-left: 6px solid var(--green); text-align: left;">
                <p style="color:var(--green); font-weight:bold;">💡 Suggested Practice</p>
                <h2 style="margin-top:0;">${suggested.practice}</h2>
                <p style="color:var(--text);">${suggested.action}</p>
                <button class="btn" style="background:var(--green)" onclick="renderMood('post')">I did it!</button>
                <button class="btn-skip" style="width:100%" onclick="skipActivity()">Skip Practice</button>
            </div>
        `;
    }

    function skipActivity() {
        session.skippedActivity = true;
        renderMood('post');
    }

    function saveAndFinish() {
        const logs = JSON.parse(localStorage.getItem('logs') || "[]");
        logs.unshift({ ...session, timestamp: new Date().toISOString() });
        localStorage.setItem('logs', JSON.stringify(logs.slice(0, 50)));

        const diff = session.postMood - session.preMood;
        document.getElementById('mainUI').innerHTML = `
            <div class="card">
                <h2>Check-in Saved</h2>
                <p>${diff > 0 ? 'Your mood improved by '+diff+' points!' : 'Session complete.'}</p>
                <button class="btn" onclick="showHome()">Back to Home</button>
            </div>
        `;
    }

    function showHistory() {
        const ui = document.getElementById('mainUI');
        const logs = JSON.parse(localStorage.getItem('logs') || "[]");
        let html = `<div class="card"><h2>Passed Reports</h2>`;
        if (logs.length === 0) html += `<p>No data yet.</p>`;

        logs.forEach(log => {
            const date = new Date(log.timestamp).toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
            const diff = (log.postMood && log.preMood) ? (log.postMood - log.preMood) : 0;
            html += `
                <div class="history-item" style="text-align:left; border-bottom:1px solid #eee; padding:10px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <small>${date}</small>
                        <strong style="color:${diff > 0 ? 'var(--green)' : 'var(--gray)'}">${diff > 0 ? '+' : ''}${diff} Mood</strong>
                    </div>
                    <div style="font-size:0.7rem; color:var(--gray);">${Object.entries(log.answers || {}).map(([k,v]) => `${k}:<b>${v}</b>`).join(' • ')}</div>
                </div>`;
        });
        html += `<button class="btn btn-outline" style="margin-top:20px" onclick="showHome()">Back</button></div>`;
        ui.innerHTML = html;
    }

    window.onload = showHome;
</script>
