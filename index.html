<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vibe Tracker</title>
    <style>
        /* 1. Reset & iOS Fixes */
        :root { --blue: #007AFF; --bg: #F2F2F7; --text: #1C1C1E; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. Layout Containers */
        #app-container { width: 100%; max-width: 500px; margin-top: 20px; }

        .card {
            background: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 20px;
        }

        /* 3. Elements */
        h2 { font-size: 22px; margin-bottom: 10px; }
        p { color: #636366; margin-bottom: 25px; }

        .btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin-bottom: 10px;
        }

        input[type="range"] { width: 100%; margin: 20px 0; accent-color: var(--blue); }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="surveyUI">
            <div class="card">
                <h2>Loading App...</h2>
                <p>If this stays white, please refresh Safari.</p>
                <button class="btn" onclick="startSurvey()">Force Start</button>
            </div>
        </div>
    </div>

    <script>
        // DATA: All your variables
        const questions = [
            { id: 'tension', text: "Is your jaw or neck tense?", type: 'choice', options: ['Totally Relaxed', 'Slightly Tense', 'Very Tight'] },
            { id: 'coffee', text: "Cups of coffee today?", type: 'range', min: 0, max: 10 },
            { id: 'social', text: "Did you avoid a social interaction?", type: 'choice', options: ['No', 'Yes, felt drained'] },
            { id: 'laugh', text: "Did you have a genuine laugh?", type: 'choice', options: ['Yes!', 'Not really'] },
            { id: 'doom', text: "Did you scroll without thinking?", type: 'choice', options: ['No', 'A little', 'Too much'] }
        ];

        let step = 0;
        let results = {};

        function startSurvey() {
            step = 0;
            results = {};
            render();
        }

        function render() {
            const ui = document.getElementById('surveyUI');
            const q = questions[step];

            if (step >= questions.length) {
                ui.innerHTML = `<div class="card"><h2>Done!</h2><p>Data saved to your phone.</p><button class="btn" onclick="startSurvey()">Restart</button></div>`;
                saveToDisk();
                return;
            }

            let inputHTML = '';
            if (q.type === 'choice') {
                inputHTML = q.options.map(opt => `<button class="btn" onclick="next('${opt}')">${opt}</button>`).join('');
            } else {
                inputHTML = `
                    <input type="range" id="slider" min="${q.min}" max="${q.max}" value="${q.min}">
                    <p>Current: <span id="val">${q.min}</span></p>
                    <button class="btn" onclick="next(document.getElementById('slider').value)">Confirm</button>
                `;
            }

            ui.innerHTML = `
                <div class="card">
                    <p>Question ${step + 1} of ${questions.length}</p>
                    <h2>${q.text}</h2>
                    ${inputHTML}
                </div>
            `;

            // Slider listeners
            const s = document.getElementById('slider');
            if(s) s.oninput = function() { document.getElementById('val').innerText = this.value; }
        }

        function next(val) {
            results[questions[step].id] = val;
            step++;
            render();
        }

        function saveToDisk() {
            const logs = JSON.parse(localStorage.getItem('logs') || "[]");
            logs.unshift({ date: new Date().toISOString(), ...results });
            localStorage.setItem('logs', JSON.stringify(logs));
        }

        // Initialize
        window.onload = startSurvey;
    </script>
</body>
</html>
